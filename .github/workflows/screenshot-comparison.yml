name: screenshot-comparison

on:
  pull_request:
    branches: [ main, master, develop, feature/adjust-screenshot ]

jobs:
  screenshot-comparison:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK
        uses: ./.github/actions/setup-java

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Download reference images
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          name: expected_screenshots
          path: app/screenshots
          workflow: upload_expected_image.yml
          branch: ${{ github.base_ref }}

      - name: Inject secrets into local.properties
        run: echo "reward.server.url=${{ secrets.REWARD_SERVER_URL }}" >> local.properties

      - name: Run screenshot tests
        run: ./gradlew compareRoborazziDebug

      - name: Upload comparison results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: screenshot-diff-reports
          path: |
            **/reports
            **/build/outputs/roborazzi
          retention-days: 30

      - name: Save PR number for comment
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          mkdir -p ./pr
          echo ${{ github.event.number }} > ./pr/NR
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: pr
          path: pr/
