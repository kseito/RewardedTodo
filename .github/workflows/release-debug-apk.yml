name: Release Debug APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag name (e.g. debug-1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 17
        uses: ./.github/actions/setup-java

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Inject secrets into local.properties
        run: echo "reward.server.url=${{ secrets.REWARD_SERVER_URL }}" >> local.properties

      - name: Decode debug keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > debug.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Create GitHub Release with debug APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" \
            app/build/outputs/apk/debug/app-debug.apk \
            --title "${{ inputs.tag }}" \
            --generate-notes \
            --target "${{ github.sha }}"
