name: Detekt

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  detekt:
    name: Run Detekt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Set up JDK
        uses: ./.github/actions/setup-java

      - name: Run Detekt
        run: ./gradlew detekt
