name: Detekt

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  detekt:
    name: Run Detekt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up JDK
        uses: ./.github/actions/setup-java

      - name: Run Detekt
        run: ./gradlew detekt
