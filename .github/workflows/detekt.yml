name: Detekt

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  detekt:
    name: Run Detekt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK
        uses: ./.github/actions/setup-java

      - name: Run Detekt
        run: ./gradlew detekt
