appId: jp.kztproject.rewardedtodo.debug
tags:
  - android
  - rewardedtodo
  - lottery
---
- launchApp:
    clearState: true

# Navigate to Reward tab
- tapOn:
    text: "Reward"

# Add a non-repeat reward (Repeat checkbox stays OFF by default) with 100% win rate
- tapOn:
    text: "Add"

# Wait for bottom sheet to appear
- extendedWaitUntil:
    visible: "Reward Title"
    timeout: 5000

# Enter reward title
- tapOn: "Reward Title"
- inputText: "One Time Prize"

# Enter reward description
- tapOn: "Reward Description"
- inputText: "Disappears after winning once"
- hideKeyboard

# Enter chance of winning (100% guarantees a win)
- tapOn: "Chance of Winning.*"
- inputText: "100"
- hideKeyboard

# Tap Save button (Repeat is left unchecked => needRepeat = false)
- tapOn: "Save"

# Wait for bottom sheet to close
- assertNotVisible:
    text: "Reward Title"

# Wait for the reward to appear
- extendedWaitUntil:
    visible: "One Time Prize"
    timeout: 10000

# Navigate to Todo tab to earn 1 ticket
- tapOn:
    text: "Todo"

# Wait for Todo tab to load
- assertVisible:
    text: "Add"

# Add one todo to earn 1 ticket
- tapOn:
    text: "Add"
- assertVisible: "Title"
- tapOn: "Title"
- inputText: "Earn Ticket"
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Earn Ticket"
    timeout: 3000

# Complete the todo by tapping checkbox
- tapOn:
    text: "todo_checkbox"
    index: 0

# Navigate back to Reward tab
- tapOn:
    text: "Reward"

# Verify we have 1 ticket
- assertVisible: "1 tickets"

# Run single lottery (guaranteed win at 100%)
- tapOn:
    text: "single_lottery_button"

# Wait for the won dialog
- extendedWaitUntil:
    visible:
      text: "You won.*"
    timeout: 3000

# Close the dialog
- tapOn: "OK"

# The non-repeat reward should be removed from the list after winning
- extendedWaitUntil:
    notVisible: "One Time Prize"
    timeout: 5000

# Verify ticket was consumed (should be 0 tickets now)
- assertVisible: "0 tickets"
